name: Hotel Pricing Bot

on:
  schedule:
    # Ejecutar cada 5 minutos
    - cron: '*/5 * * * *'

  # Permitir ejecución manual
  workflow_dispatch:

jobs:
  pricing-cycle:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v3

      - name: 🔧 Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm install

      - name: 🔑 Crear archivo .env
        run: |
          cat > .env << 'EOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          PX_API_KEY=${{ secrets.PXSOL_API_KEY }}
          PX_BASE_URL=${{ secrets.PXSOL_API_URL }}
          PX_HOTEL_ID=${{ secrets.HOTEL_ID }}
          NODE_ENV=prod
          LOG_LEVEL=info
          EOF

      - name: 🚀 Ejecutar ciclo de pricing
        run: npm run dev
        timeout-minutes: 10

      - name: 📋 Guardar logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pricing-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7

      - name: ✅ Notificar éxito
        if: success()
        run: echo "✅ Ciclo de pricing completado exitosamente"

      - name: ❌ Notificar error
        if: failure()
        run: |
          echo "❌ Error en ciclo de pricing"
          exit 1
